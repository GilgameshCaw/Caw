[profile.default]
src = "contracts"
test = "test-foundry"
out = "foundry-out"
cache_path = "cache-foundry"
libs = ["lib", "node_modules"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 1
via_ir = true
# We don't want Foundry to compile the Truffle JS tests or scripts.
# Match the Truffle/Hardhat target: only the contracts/ tree + the new test-foundry/ tree.
auto_detect_remappings = false
fs_permissions = [{ access = "read", path = "./" }]
# ffi enabled for StorageLayoutSnapshot.t.sol which shells out to node to compare
# storage-layout goldens. Intentional — the test is only checking layouts, not
# running untrusted code.
ffi = true

[fuzz]
# Tight memory budget on the dev machine; 1000 runs per fuzz test by default.
runs = 1000

[invariant]
runs = 64
depth = 32
fail_on_revert = false
