<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAW — coming soon</title>
  <meta name="description" content="CAW Protocol — a trustless decentralized social clearing-house. Mainnet coming soon. Try the testnet now." />
  <meta property="og:title" content="CAW — coming soon" />
  <meta property="og:description" content="CAW Protocol — a trustless decentralized social clearing-house. Mainnet coming soon. Try the testnet now." />
  <meta name="theme-color" content="#fbbf24" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      min-height: 100dvh;
      background-image: radial-gradient(circle at 50% 30%, rgba(251, 191, 36, 0.18), transparent 60%);
    }
    h1 {
      font-size: clamp(3rem, 14vw, 7rem);
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fde68a, #fbbf24, #d97706);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p.tagline {
      max-width: 36rem;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.55;
      margin: 1.25rem 0 2.5rem;
    }
    a.cta {
      display: inline-block;
      padding: 0.9rem 2rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: #000;
      background: #fbbf24;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 120ms ease, background 120ms ease;
    }
    a.cta:hover { background: #f59e0b; transform: translateY(-1px); }
    .footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
    }
    .footer a { color: rgba(255, 255, 255, 0.6); text-decoration: none; }
    .footer a:hover { color: #fbbf24; }
  </style>
</head>
<body>
  <h1>CAW</h1>
  <p class="tagline">
    A trustless, decentralized social clearing-house for free speech.
    <br />
    Mainnet is coming soon. Try it on testnet today.
  </p>
  <a class="cta" href="https://testnet.caw.social">Open testnet →</a>
  <div class="footer">
    <a href="https://github.com/GilgameshCaw/Caw">github.com/GilgameshCaw/Caw</a>
  </div>
</body>
</html>
