version: '3.8'

services:
  xmtp-node:
    image: xmtp/node-js:latest
    container_name: caw-xmtp-node
    environment:
      - NODE_ENV=development
      - PORT=5555
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/caw_dev
      - XMTP_ENV=dev
      - LOG_LEVEL=debug
      - XMTP_PRIVATE_KEY=${VALIDATOR_PRIVATE_KEY}
    ports:
      - "5555:5555"
    volumes:
      - ./xmtp-data:/data
      - ./src/services/XmtpService:/app
    networks:
      - caw-network
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: caw-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=caw_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - caw-network

  redis:
    image: redis:7-alpine
    container_name: caw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - caw-network

volumes:
  postgres-data:
  redis-data:
  xmtp-data:

networks:
  caw-network:
    driver: bridge