<!doctype html>
<html lang="en" style="background-color: #0A0A0A">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Decentralized Social Clearing House"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAW</title>
  </head>
  <body style="background-color: #0A0A0A; margin: 0">
    <div id="theme-bg" style="position: fixed; inset: 0; z-index: 0; background-color: #0A0A0A"></div>
    <div id="root" style="position: relative; z-index: 1"></div>
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('theme-storage') || '{}');
        if (t.state && t.state.isDark === false) {
          document.getElementById('theme-bg').style.backgroundColor = '#f3f4f6';
          document.documentElement.style.backgroundColor = '#f3f4f6';
          document.body.style.backgroundColor = '#f3f4f6';
        }
      } catch(e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
